<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Decoration</title>
    <style>
        @font-face {
            font-family: 'myfont';
            src: url('/html/fonts/Amsterline.ttf')format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        h1{
            font-family: 'myfont',sans-serif;
            font-size: 100px;
            text-decoration:none;
            text-indent: 20px;
            text-align: center;
            text-transform: capitalize;
            /* word-spacing: 5px; */
            letter-spacing: 20px;
        }
    </style>-
</head>

<body>
    <h1>Ravikant kumar</h1>
</body>

</html>
