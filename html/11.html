<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Forms</title>
</head>

<body>
    <form>
        <fieldset>
            <legend>Login Details</legend>
            UserName: <input type="Text" name="username" size="30" value="username" maxlength="20"><br>
            Password: <input type="Password" name="password" size="30" value="password" maxlength="20"><br>
            <input type="Submit" value="Login">
        </fieldset>
        <fieldset>
            <legend>Personal Information</legend>
            Name: <input type="text" name="name" size="30" value="name" maxlength="20"><br>
            Father's Name: <input type="text" name="FathersName" size="30" value="FathersName" maxlength="20"><br>
            Mobile No: <input type="text" name="mobile" size="20" value="9876543210" maxlength="10"><br>
            Gender: <br><input type="radio" name="gender" value="male">Male<br>
            <input type="radio" name="gender" value="female">Female<br>
            <input type="radio" name="gender" value="transgender">Transgender<br>

            Hobbies: <br>
            <input type="checkbox" name="hobbies" value="singing">Singing<br>
            <input type="checkbox" name="hobbies" value="dancing">Dancing<br>
            <input type="checkbox" name="hobbies" value="Reading">Reading<br>
            <input type="checkbox" name="hobbies" value="acting">Acting<br>
            Select District: <select name="district">
                <option value="Bhubaneswar">Bhubaneswar</option>
                <option value="Cuttack">Cuttack</option>
                <option value="Puri">Puri</option>
                <option value="Rourkela">Rourkela</option>
            </select><br>
            Scrollable Select District: <select name="district" size="4" multiple>
                <option value="Bhubaneswar">Bhubaneswar</option>
                <option value="Cuttack">Cuttack</option>
                <option value="Puri">Puri</option>
                <option value="Rourkela">Rourkela</option>
                <option value="Ramgarh">Ramgarh</option>
                <option value="Sundargarh">Sundargarh</option>
                <option value="Jajpur">Jajpur</option>
            </select><br>
            Feedback: <textarea name="feedback" rows="5" cols="60">Enter your feedback here...</textarea><br>
        </fieldset>
    </form>
</body>

</html>
