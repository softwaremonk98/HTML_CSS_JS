<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card layout</title>
    <style>
        #container{
            display: flex;
            flex-wrap: wrap;
            background-color: rgba(0,0,0,0.3);
        }
        #card{
            width: 300px;
            height: 400px;
            border: 2px solid rgb(199, 67, 67);
            margin: 20px;
            padding: 20px;
            box-shadow: 10px  10px 20px rgba(43, 0, 255, 0.5);
            align-items: center;
            display: flex;
            flex-direction: column;
            background-color: rgb(124, 255, 225);
        }
        #card-header{
            width: 100%;
            height: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            margin-top: 20px;
        }
        #card-body{
            width: 100%;
            height: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
        }        #card-footer{
            width: 100%;
            height: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        p{
            font-weight:bold;
            font-size: 20px;
            height: 30px;
            width:200px;
            text-align: center;
            border: 2px solid rgb(49, 49, 49);
            margin: 20px;
            margin-bottom: 5px;
            margin-top: 5;
        }
        button{
            width: 100px;
            height: 30px;
            background-color: rgb(255, 0, 0);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="card">
            <div id="card-header">
                <img src="images/shirt.webp" alt="Shirt" height="280" width="250">
            </div>
            <div id="card-body">
                <p>Shirt</p>
            </div>
            <div id="card-footer">
                <p>&#8377; <del>4999.00</del>&nbsp;&#8377;1299.00</p>
                <button>Buy Now</button>
            </div>
        </div>
        <div id="card">
            <div id="card-header">
                <img src="images/shirt.webp" alt="Shirt" height="280" width="250">
            </div>

                <p>&#8377; <del>4999.00</del>&nbsp;&#8377;1299.00</p>
                <button>Buy Now</button>
            </div>
        </div>
    </div>
</body>
</html>
