<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Bootstrap Icons</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
        }

        ul {
            display: flex;
            list-style: none;
            padding: 20px;
            margin: 0;
            position: fixed;
            width: 100%;
            background-color: #222;
        }

        li {
            width: 200px;
            background-color: aquamarine;
            color: red;
            font-weight: bold;
            font-size: 20px;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
        }

        li:hover {
            background-color: teal;
            color: white;
        }

        .bi {
            margin-right: 8px;
        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li><span class="bi bi-house-heart"></span> Home</li>
            <li><span class="bi bi-gear-wide"></span> Services</li>
            <li><span class="bi bi-cart"></span> Products</li>
            <li><span class="bi bi-telephone"></span> Contact</li>
            <li><span class="bi bi-info-circle"></span> About</li>
        </ul>
    </nav>
</body>

</html>
