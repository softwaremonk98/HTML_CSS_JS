<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* height: 100vh; */
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #32c5ff, #d61cff);
        }

        .container {
            width: 420px;
            height: 830px;
            background: #fff;
            padding: 50px 45px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .container h1 {
            text-align: center;
            font-size: 42px;
            margin-bottom: 40px;
            color: #222;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
            font-size: 16px;
            outline: none;
            background: transparent;
            color: #333;
        }

        .form-group textarea {
            resize: none;
            height: 90px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #bbb;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(90deg, #ff00cc, #33ccff);
            transition: 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        @media(max-width:500px) {
            .container {
                width: 90%;
                padding: 40px 25px;
            }

            .container h1 {
                font-size: 34px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Say Hi!</h1>
        <form>
            <div class="form-group"><label>Your Name</label><input type="text" placeholder="Enter your name"></div>
            <div class="form-group"><label>Your Email</label><input type="email" placeholder="Enter your email"></div>
            <div class="form-group"><label>Your Password</label><input type="password"
                    placeholder="Enter your password"></div>
            <div class="form-group"><label>Service Needed </label><select>
                    <option value="Web Development">Web Development</option>
                    <option value="App Development">App Development</option>
                    <option value="UI/UX Design">UI/UX Design</option>
                </select></div>
            <div class="form-group"><label>Budget</label><select>
                    <option value="1000-5000">&#8377;
                        1000 - &#8377;
                        5000</option>
                    <option value="5000-10000">&#8377;
                        5000 - &#8377;
                        10000</option>
                    <option value="10000+">&#8377;
                        10000+</option>
                </select></div>
            <div class="form-group"><label>Project Description</label><textarea
                    placeholder="Describe your project"></textarea></div><button class="submit-btn"
                type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
