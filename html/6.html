<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="1" bgcolor="aqua" cellpadding="5" cellspacing="10">
        <tr >
            <th colspan="4">Stock</th>
        </tr>
        <tr>
            <td rowspan="5">Entries</td>
        </tr>
        <tr bgcolor="yellow">
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
        </tr>
        <tr >
            <td>shirt</td>
            <td> 250  </td>
            <td>250</td>
        </tr>
        <tr bgcolor="red">
            <td>T-shirt</td>
            <td> 300  </td>
            <td>250</td>
        </tr>
        <tr>
            <td>Jeans</td>
            <td>600  </td>
            <td>1000</td>
        </tr>
    </table>
</body>
</html>
